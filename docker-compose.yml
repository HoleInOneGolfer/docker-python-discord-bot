services:
  discord-bot:
    container_name: discord-bot
    restart: always
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
    volumes:
      # Your persistent data volume for SQLite
      - ./bot:/data

      - ./src:/app/src # ⚡ DEVELOPER MODE: Mount your source code for live updates
    build: . # ⚡ DEVELOPER MODE: Build from local Dockerfile
